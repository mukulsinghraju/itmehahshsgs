<head>

    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="pragma" content="no-cache">
    <meta name="robots" content="noindex">

 <style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    position:fixed;
    inset:0;
    touch-action:manipulation;
}

#wrapper{
    position:fixed;
    inset:0;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    background:#000;
}

@supports not (height:100dvh){
    #wrapper{
        height:100vh;
    }
}

#player{
    width:100%;
    height:100%;
    overflow:hidden;
}

.bmpui-ui-uicontainer,
.bmpui-player-wrapper{
    width:100%!important;
    height:100%!important;
}
     
video{
    width:100%!important;
    height:100%!important;
}   

   #status{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    background:#000;
    z-index:999;
}

.spinner{
    width:46px;
    height:46px;
    border:4px solid rgba(255,255,255,.15);
    border-top-color:#ff0000;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.s-title{
    color:#fff;
    font-size:18px;
    font-weight:600;
}  
   </style>     
</head>
<body>

    <div id="wrapper">
         <div id="status">
        <div class="spinner"></div>
        <div class="s-title">Loading...</div>
    </div>
 
        <div id="player"></div>
